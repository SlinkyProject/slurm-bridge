---
configFiles:
  topology.yaml: |
    ---
    - topology: topo-switch
      cluster_default: true
      tree:
        switches:
          - switch: sw_root
            children: s[1-2]
          - switch: s1
          - switch: s2
nodesets:
  slinky:
    enabled: false
controller:
  extraConf: |
    ReconfigFlags=KeepPartInfo
    GresTypes=gpu
    Nodeset=slurm-bridge Feature=slurm-bridge
    PartitionName=slurm-bridge Nodes=slurm-bridge State=UP Default=NO
