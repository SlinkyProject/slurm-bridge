---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-gpu-nvidia
  namespace: slurm-bridge
  annotations:
    slurmjob.slinky.slurm.net/job-name: job-gpu-nvidia
spec:
  completions: 1
  parallelism: 1
  template:
    metadata:
      annotations:
        slurmjob.slinky.slurm.net/job-name: job-gpu-nvidia
    spec:
      schedulerName: slurm-bridge-scheduler
      restartPolicy: Never
      tolerations:
        - key: slinky.slurm.net/managed-node
          operator: Equal
          value: slurm-bridge-scheduler
          effect: NoExecute
      containers:
        - name: gpu
          image: busybox:1.36
          command: [sleep, '30']
          resources:
            requests:
              cpu: '1'
              memory: 16Mi
              deviceclass.resource.kubernetes.io/gpu.nvidia.com: '1'
            limits:
              cpu: '1'
              memory: 32Mi
              deviceclass.resource.kubernetes.io/gpu.nvidia.com: '1'
