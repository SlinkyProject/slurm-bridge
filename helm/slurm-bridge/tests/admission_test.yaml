---
suite: test admission
templates:
  - admission/deployment.yaml
  - admission/rbac.yaml
  - admission/service.yaml
  - admission/webhook.yaml
  - configmap.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: manifests should match snapshot
    set:
      admission:
        enabled: true
    asserts:
      - matchSnapshot: {}
  - it: deployment carries a config checksum annotation so configmap changes trigger a rolling restart
    template: admission/deployment.yaml
    set:
      admission:
        enabled: true
    asserts:
      - isNotNullOrEmpty:
          path: spec.template.metadata.annotations["checksum/config"]
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: ^[0-9a-f]{64}$
