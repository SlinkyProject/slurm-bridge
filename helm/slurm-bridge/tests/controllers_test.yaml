---
suite: test controllers
templates:
  - controllers/deployment.yaml
  - controllers/rbac.yaml
  - controllers/service.yaml
  - configmap.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: manifests should match snapshot
    asserts:
      - matchSnapshot: {}
  - it: deployment carries a config checksum annotation so configmap changes trigger a rolling restart
    template: controllers/deployment.yaml
    asserts:
      - isNotNullOrEmpty:
          path: spec.template.metadata.annotations["checksum/config"]
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: ^[0-9a-f]{64}$
  - it: image pull policy is configurable
    template: controllers/deployment.yaml
    set:
      controllers.image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
  - it: leader election can be enabled
    template: controllers/deployment.yaml
    set:
      controllers.leaderElect: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-elect=true
  - it: controllers can update their leader election lease
    template: controllers/rbac.yaml
    documentSelector:
      path: kind
      value: ClusterRole
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - create
              - get
              - list
              - update
  - it: controllers can record leader election events
    template: controllers/rbac.yaml
    documentSelector:
      path: kind
      value: ClusterRole
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch
